<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>ShopEasy - Home</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script th:src="@{/js/main.js}" defer></script>
</head>
<body>

<!-- Navbar -->
<nav>
    <a href="/">ShopEasy</a>
    <div>
        <a href="/products">Products</a>
        <a href="/cart" id="cart-icon">
            🛒 Cart (<span id="cart-count">0</span>)
        </a>
        <a href="/login">Login</a>
    </div>
</nav>

<!-- Search -->
<div class="search-container">
    <form action="/products" method="get">
        <input type="text" name="query" placeholder="Search products...">
        <button type="submit">Search</button>
    </form>
</div>

<h2>Featured Products</h2>
<div class="product-grid">
    <div class="product-card" th:each="p : ${products}">
        <img th:src="@{'/images/' + ${p.imageUrl}}" alt="Product">
        <h3 th:text="${p.name}"></h3>
        <p class="price" th:text="${p.price} + ' PKR'"></p>
        <button th:onclick="'addToCart(' + ${p.id} + ')'">Add to Cart</button>
    </div>
</div>

</body>
</html>
